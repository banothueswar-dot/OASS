<!DOCTYPE html>

<html>
<head>
    <title>Register</title>

<style>
    * {
        box-sizing: border-box;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #eef2f7;
        margin: 0;
        padding: 0;
    }

    .container {
        width: 350px;
        margin: 80px auto;
    }

    h2 {
        text-align: center;
        color: #333;
    }

    .card {
        background: white;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    label {
        font-weight: 500;
        display: block;
        margin-top: 10px;
    }

    input, select {
        width: 100%;
        padding: 12px;
        margin-top: 6px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
    }

    button {
        width: 100%;
        background: #007bff;
        color: white;
        padding: 12px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 15px;
    }

    button:hover {
        background: #0056b3;
    }

    .login-link {
        display: block;
        text-align: center;
        margin-top: 15px;
        text-decoration: none;
        color: #007bff;
    }

    .login-link:hover {
        text-decoration: underline;
    }
</style>

</head>

<body>

<div class="container">

<div class="card">
    <h2>Register</h2>

    {% if error %}
        <p style="color: red; text-align: center;">{{ error }}</p>
    {% endif %}

    <form method="POST">
        <label>Name</label>
        <input type="text" name="name" required>

        <label>Email</label>
        <input type="email" name="email" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <label>Role</label>
        <select name="role">
            <option value="student">Student</option>
            <option value="faculty">Faculty</option>
        </select>

        <button type="submit">Register</button>
    </form>

    <a href="/login" class="login-link">Already have account? Login</a>
</div>

</div>

</body>
</html>
